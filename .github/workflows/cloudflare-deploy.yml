name: Deploy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # code-split build (smaller, lazy 3D chunk) — best for a hosted site.
      # swap to `npm run build` if you ever want the single-file output instead.
      - run: npm run build:web
      - name: Deploy to Cloudflare (wrangler)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          # Uncomment if your token can see more than one Cloudflare account:
          # accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
